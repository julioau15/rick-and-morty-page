<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./src/style/style.css">
    <script type="module"  src="./src/script/buscarDados.js" defer></script>
    <script type="module" src="./src/script/atualizarPagina.js" defer></script>
    <script type="module" src="./src/script/app.js" defer></script>
    <title>Rick And Morty</title>
</head>
<body>
    <header>
        <h1>Rick And Morty</h1>
    </header>

    <main>
        <section class="search-container">
            <input id="input-personagem" type="text" placeholder="&#128270; Procure personagens pelo nome...">
    
            <div class="select-container">
                <select name="select-status" id="select-status">
                    <option class="status-option" value="">All Statuses</option>
                    <option class="status-option" value="Alive">Alive</option>
                    <option class="status-option" value="Dead">Dead</option>
                    <option class="status-option" value="Unknown">Unknown</option>
                </select>
    
                <select name="select-species" id="select-species">
                    <option class="species-option" value="">All Species</option>
                    <option class="species-option" value="Human">Human</option>
                    <option class="species-option" value="Alien">Alien</option>
                    <option class="species-option" value="Humanoid">Humanoid</option>
                    <option class="species-option" value="Robot">Robot</option>
                    <option class="species-option" value="Animal">Animal</option>
                    <option class="species-option" value="Cronenberg">Cronenberg</option>
                    <option class="species-option" value="Mythological Creature">Mythological Creature</option>
                </select>
            </div>
        </section>
    
        <section class="card-section" id="card-container">

            <div id="details-card">
                <img src="" alt="imagem do personagem">
                <div id="details-container">
                    <p>Species:     <span>Human</span></p>
                    <p>Gender:      <span>Male</span></p>
                    <p>origin:      <span>Earth (C-137)</span></p>
                    <p>Location:    <span> Citadel of Ricks</span></p>
                    <p>Episodes:    <span>51</span></p>
                </div>
            </div>

        </section>

        <section class="change-page">
            <button id="voltar">Voltar</button>
            <button id="avancar">Avançar</button>
        </section>
    </main>

    <footer>
        <span>&copy; Julio Augusto</span>
    </footer>

</body>
</html>
